<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Europe Flow Field (p5.js)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* Keep form controls and scrollbars readable in dark contexts. */
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0f14;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font: 12px/1.35 'Hanken Grotesk', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      canvas {
        display: block;
      }

      /* High-contrast overlay panel used for all UI elements. */
      .ui-panel {
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        padding: 12px;
      }

      .ui-panel a {
        color: inherit;
      }

      .ui-panel input,
      .ui-panel button,
      .ui-panel select {
        font: inherit;
      }

      .ui-root {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 260px;
      }

      .ui-section {
        padding-top: 10px;
        margin-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .ui-section:first-child {
        padding-top: 0;
        margin-top: 0;
        border-top: none;
      }

      .ui-section-title {
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0.85;
        margin-bottom: 8px;
      }

      .ui-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .ui-row + .ui-row {
        margin-top: 6px;
      }

      .ui-hex {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 11px;
        opacity: 0.9;
      }

      .ui-panel input.ui-hex {
        width: 7.25em;
        max-width: 100%;
        margin: 0;
        padding: 2px 6px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(0, 0, 0, 0.35);
        color: inherit;
        opacity: 1;
        user-select: text;
      }

      .ui-panel input.ui-hex:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.45);
        background: rgba(0, 0, 0, 0.5);
      }

      .ui-swatch {
        width: 18px;
        height: 18px;
        padding: 0;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        outline: none;
        background: transparent;
        cursor: pointer;
      }

      .ui-swatch.is-selected {
        outline: 2px solid rgba(255, 255, 255, 0.9);
        outline-offset: 1px;
      }

      .ui-swatch-grid {
        display: grid;
        grid-template-columns: repeat(6, 18px);
        gap: 6px;
        margin-top: 6px;
        max-width: 100%;
      }

      .ui-preview {
        width: 14px;
        height: 14px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.22);
      }

      .ui-panel input[type='range'] {
        width: 160px;
      }

      .ui-panel input[type='color'] {
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        padding: 0;
        background: transparent;
        vertical-align: middle;
      }

      .ui-panel input[type='range'] {
        vertical-align: middle;
      }

      .ui-shortcuts {
        opacity: 0.85;
        font-size: 11px;
      }

      .timeline-container {
        position: fixed;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        width: 60%;
        max-width: 800px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 20;
      }

      .timeline-line {
        position: absolute;
        top: 50%;
        left: 20px;
        right: 20px;
        height: 2px;
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-50%);
        z-index: 1;
      }

      .timeline-dot {
        position: relative;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        border: 2px solid transparent;
        outline: 1px solid black;
        cursor: pointer;
        z-index: 2;
        transition: all 0.2s;
      }

      .timeline-dot:hover {
        background: #fff;
      }

      .timeline-dot.active {
        background: #fff;
        transform: scale(1.4);
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
      }

      .user-controls-root {
        position: fixed;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        z-index: 20;
        width: max-content;
      }

      #user-color-root,
      #user-color-root .user-color-inner {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
      }

      #user-color-root input.ui-hex {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 14px;
        width: 8em;
        margin: 0;
        padding: 2px 6px;
        border-radius: 0;
        border: none;
        background: transparent;
        color: #000;
        text-align: center;
        user-select: text;
      }

      #user-color-root .user-color-hex-row {
        gap: 10px;
        flex-wrap: nowrap;
      }

      .user-color-root {
        width: 100%;
      }

      .user-color-preset-row {
        display: flex;
        gap: 6px;
        flex: 1;
        min-width: 0;
        width: 100%;
        margin-bottom: 0;
      }

      .user-color-controls-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        margin-bottom: 6px;
      }

      .user-transparent-bg-toggle {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 2px solid rgba(0, 0, 0, 0.55);
        border-radius: 4px;
        cursor: pointer;
        position: relative;
        background-color: #fff;
        background-image:
          linear-gradient(45deg, #bdbdbd 25%, transparent 25%),
          linear-gradient(-45deg, #bdbdbd 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #bdbdbd 75%),
          linear-gradient(-45deg, transparent 75%, #bdbdbd 75%);
        background-size: 8px 8px;
        background-position: 0 0, 0 4px, 4px -4px, -4px 0;
        outline: none;
      }

      .user-transparent-bg-toggle:hover {
        border-color: rgba(0, 0, 0, 0.8);
      }

      .user-transparent-bg-toggle:focus-visible {
        outline: 2px solid rgba(0, 0, 0, 0.75);
        outline-offset: 2px;
      }

      .user-transparent-bg-check {
        position: absolute;
        left: 7px;
        top: 2px;
        width: 8px;
        height: 14px;
        border: solid #111;
        border-width: 0 3px 3px 0;
        transform: rotate(45deg);
        opacity: 0;
        pointer-events: none;
      }

      .user-transparent-bg-toggle.is-active .user-transparent-bg-check {
        opacity: 1;
      }

      .user-color-preset {
        flex: 1;
        height: 22px;
        min-width: 0;
        padding: 0;
        border: none;
        border-radius: 0;
        cursor: pointer;
        outline: 1px solid rgba(0, 0, 0, 0.35);
      }

      .user-color-preset.is-active {
        outline: 2px solid rgba(255, 255, 255, 0.9);
        outline-offset: 1px;
      }

      .user-stage-root {
        display: flex;
        align-items: center;
        justify-content: center;
        align-self: stretch;
        width: 100%;
      }

      .user-stage-wrap {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 10px 0;
      }

      .user-stage-slider {
        -webkit-appearance: none;
        appearance: none;
        flex: 1;
        min-width: 0;
        width: 100%;
        height: 12px;
        margin: 0;
        padding: 0;
        border: none;
        background: transparent;
        cursor: pointer;
      }

      .user-stage-slider:focus {
        outline: none;
      }

      .user-stage-slider::-webkit-slider-runnable-track {
        height: 1px;
        background: #000;
        border: none;
        border-radius: 0;
      }

      .user-stage-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 10px;
        height: 10px;
        margin-top: -4.5px;
        border: none;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
      }

      .user-stage-slider::-moz-range-track {
        height: 1px;
        background: #000;
        border: none;
        border-radius: 0;
      }

      .user-stage-slider::-moz-range-thumb {
        width: 10px;
        height: 10px;
        border: none;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
      }

      .mode-toggle-root {
        position: fixed;
        right: 12px;
        bottom: 12px;
        z-index: 25;
      }

      .mode-switch {
        display: flex;
        align-items: center;
        gap: 0;
        padding: 3px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: #fff;
        font: inherit;
        font-size: 11px;
        user-select: none;
      }

      .mode-switch-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
        opacity: 0.7;
      }

      .mode-switch-btn.is-active {
        background: rgba(255, 255, 255, 0.92);
        color: #111;
        opacity: 1;
      }

      .record-indicator {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        display: none;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        font-size: 12px;
        user-select: none;
        pointer-events: none;
      }

      .record-indicator.is-visible {
        display: flex;
      }

      .record-indicator-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #e53935;
        flex-shrink: 0;
        animation: record-pulse 1.2s ease-in-out infinite;
      }

      .record-indicator.is-encoding .record-indicator-dot {
        animation: none;
        background: rgba(255, 255, 255, 0.5);
      }

      @keyframes record-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
    </style>
  </head>
  <body>
    <div id="ui-root" class="ui-root" aria-label="Sketch controls" style="display: none;"></div>
    <div id="timeline-root" class="timeline-container"></div>
    <div id="user-controls-root" class="user-controls-root" aria-label="User controls">
      <div id="user-color-root" class="user-color-root" aria-label="Particle and background color"></div>
      <div id="user-stage-root" class="user-stage-root" aria-label="Stage presets"></div>
    </div>
    <div id="mode-toggle-root" class="mode-toggle-root" aria-label="UI mode"></div>
    <div id="record-indicator" class="record-indicator ui-panel" aria-live="polite" aria-hidden="true">
      <span class="record-indicator-dot" aria-hidden="true"></span>
      <span id="record-indicator-text">REC</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script type="module" src="mediabunny-shim.mjs"></script>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="map.js"></script>
    <script src="particle.js"></script>
    <script src="ui.js"></script>
    <script src="recorder.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
