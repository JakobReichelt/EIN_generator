<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Particle Visualizer (p5.js)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400&display=swap" rel="stylesheet" />
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #f2f2f2;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font: 12px/1.35 'Hanken Grotesk', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      canvas {
        display: block;
        position: relative;
        z-index: 1;
      }
      .ui-panel {
        background: rgba(255, 255, 255, 0.92);
        color: #111;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      .ui-root {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 100;
        width: 240px;
        max-height: calc(100vh - 24px);
        overflow: auto;
        pointer-events: auto;
      }
      .ui-section {
        padding-top: 10px;
        margin-top: 10px;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
      }
      .ui-section:first-child { padding-top: 0; margin-top: 0; border-top: none; }
      .ui-section-title {
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 8px;
      }
      .ui-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .ui-row + .ui-row { margin-top: 6px; }
      .ui-panel button {
        font: inherit;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        background: #fff;
        cursor: pointer;
      }
      .ui-panel button.is-active {
        background: #111;
        color: #fff;
        border-color: #111;
      }
      .ui-panel button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .viz-count-input {
        width: 72px;
        font: inherit;
        padding: 4px 6px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        pointer-events: auto;
      }
      .user-controls-root {
        position: fixed;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        z-index: 100;
        min-width: 320px;
        width: max-content;
        pointer-events: auto;
      }
      #user-color-root,
      #user-color-root .user-color-inner {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
      }
      #user-color-root input.ui-hex {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 14px;
        width: 8em;
        margin: 0;
        padding: 2px 6px;
        border-radius: 0;
        border: none;
        background: transparent;
        color: #000;
        text-align: center;
        user-select: text;
      }
      #user-color-root .user-color-hex-row {
        gap: 10px;
        flex-wrap: nowrap;
      }
      .user-color-root { width: 100%; }
      .user-color-preset-row {
        display: flex;
        gap: 6px;
        flex: 1;
        min-width: 0;
        width: 100%;
        margin-bottom: 0;
      }
      .user-color-controls-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        margin-bottom: 6px;
      }
      .user-transparent-bg-toggle {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 2px solid rgba(0, 0, 0, 0.55);
        border-radius: 4px;
        cursor: pointer;
        position: relative;
        background-color: #fff;
        background-image:
          linear-gradient(45deg, #bdbdbd 25%, transparent 25%),
          linear-gradient(-45deg, #bdbdbd 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #bdbdbd 75%),
          linear-gradient(-45deg, transparent 75%, #bdbdbd 75%);
        background-size: 8px 8px;
        background-position: 0 0, 0 4px, 4px -4px, -4px 0;
        outline: none;
      }
      .user-transparent-bg-check {
        position: absolute;
        left: 7px;
        top: 2px;
        width: 8px;
        height: 14px;
        border: solid #111;
        border-width: 0 3px 3px 0;
        transform: rotate(45deg);
        opacity: 0;
        pointer-events: none;
      }
      .user-transparent-bg-toggle.is-active .user-transparent-bg-check { opacity: 1; }
      .user-color-preset {
        flex: 1;
        height: 22px;
        min-width: 0;
        padding: 0;
        border: none;
        border-radius: 0;
        cursor: pointer;
        outline: 1px solid rgba(0, 0, 0, 0.35);
      }
      .user-color-preset.is-active {
        outline: 2px solid rgba(0, 0, 0, 0.75);
        outline-offset: 1px;
      }
      .user-stage-root {
        display: flex;
        align-items: center;
        justify-content: center;
        align-self: stretch;
        width: 100%;
      }
      .user-stage-wrap {
        display: flex;
        align-items: center;
        width: 100%;
        min-width: 280px;
        padding: 10px 0;
        pointer-events: auto;
      }
      .user-stage-slider {
        pointer-events: auto;
        touch-action: pan-x;
      }
      .user-stage-slider {
        -webkit-appearance: none;
        appearance: none;
        flex: 1;
        min-width: 0;
        width: 100%;
        height: 12px;
        margin: 0;
        padding: 0;
        border: none;
        background: transparent;
        cursor: pointer;
      }
      .user-stage-slider:focus { outline: none; }
      .user-stage-slider::-webkit-slider-runnable-track {
        height: 1px;
        background: #000;
        border: none;
        border-radius: 0;
      }
      .user-stage-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 10px;
        height: 10px;
        margin-top: -4.5px;
        border: none;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 0 1px #000;
        cursor: pointer;
      }
      .user-stage-slider::-moz-range-track {
        height: 1px;
        background: #000;
        border: none;
        border-radius: 0;
      }
      .user-stage-slider::-moz-range-thumb {
        width: 10px;
        height: 10px;
        border: none;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 0 1px #000;
        cursor: pointer;
      }
      .record-indicator {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 35;
        display: none;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        font-size: 12px;
        user-select: none;
        pointer-events: none;
      }
      .record-indicator.is-visible { display: flex; }
      .record-indicator-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #e53935;
        animation: record-pulse 1.2s ease-in-out infinite;
      }
      .record-indicator.is-encoding .record-indicator-dot {
        animation: none;
        background: rgba(255, 255, 255, 0.5);
      }
      @keyframes record-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
    </style>
  </head>
  <body>
    <div id="viz-ui-root" class="ui-root ui-panel" aria-label="Visualizer controls"></div>
    <div id="ui-root" class="ui-root" aria-label="Dev controls" style="display: none;"></div>
    <div id="timeline-root" class="timeline-container" style="display: none;"></div>
    <div id="user-controls-root" class="user-controls-root" aria-label="User controls">
      <div id="user-color-root" class="user-color-root" aria-label="Particle and background color"></div>
      <div id="user-stage-root" class="user-stage-root" aria-label="Stage presets"></div>
    </div>
    <div id="record-indicator" class="record-indicator ui-panel" aria-live="polite" aria-hidden="true">
      <span class="record-indicator-dot" aria-hidden="true"></span>
      <span id="record-indicator-text">REC</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script type="module" src="mediabunny-shim.mjs"></script>
    <script src="../Generator/utils.js"></script>
    <script src="../Generator/map.js"></script>
    <script src="config.js"></script>
    <script src="clusters.js"></script>
    <script src="../Generator/ui.js"></script>
    <script src="particle.js"></script>
    <script src="ui.js"></script>
    <script src="recorder.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
