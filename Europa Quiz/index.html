<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Europa Quiz</title>
    <link rel="stylesheet" href="fonts.css" />
    <link rel="stylesheet" href="figma.css" />
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #f2f2f2;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-gotham);
        font-weight: 400;
        font-size: 12px;
        line-height: 1.35;
      }
      canvas {
        display: block;
        position: relative;
        z-index: 0;
      }
      .ui-panel {
        background: rgba(255, 255, 255, 0.92);
        color: #111;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        font-family: var(--font-gotham);
      }
      .ui-section {
        padding-top: 10px;
        margin-top: 10px;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
      }
      .ui-section:first-child { padding-top: 0; margin-top: 0; border-top: none; }
      .ui-section-title {
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 8px;
      }
      .ui-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .ui-row + .ui-row { margin-top: 6px; }
      .ui-panel button,
      #dev-nav button {
        font: inherit;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        background: #fff;
        cursor: pointer;
      }
      .ui-panel button:disabled,
      #dev-nav button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #quiz-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        padding: 24px;
        box-sizing: border-box;
      }
      #dev-nav {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 120;
        width: 220px;
        pointer-events: auto;
        font-family: var(--font-gotham);
      }
      .dev-nav-title {
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 6px;
      }
      .dev-nav-label {
        font-size: 12px;
        margin-bottom: 4px;
      }
      .dev-nav-stage-title {
        font-size: 11px;
        opacity: 0.65;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div id="quiz-overlay" aria-live="polite"></div>
    <div id="dev-nav" aria-label="Development navigation"></div>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="config.js"></script>
    <script src="particlePalette.js"></script>
    <script src="quizState.js"></script>
    <script src="scoring.js"></script>
    <script src="particles.js"></script>
    <script src="ui.js"></script>
    <script src="quizParticleRegion.js"></script>
    <script src="particleInteraction.js"></script>
    <script src="particleField.js"></script>
    <script src="figmaUi.js"></script>
    <script src="stageTransitions.js"></script>
    <script src="europeMap.js"></script>
    <script src="quizTimeline.js"></script>
    <script src="topParticleLine.js"></script>
    <script src="pauseParticle.js"></script>
    <script src="confirmParticle.js"></script>
    <script src="stageManager.js"></script>
    <script src="stages/idle.js"></script>
    <script src="stages/playerCount.js"></script>
    <script src="stages/particleSelection.js"></script>
    <script src="stages/particleCreation.js"></script>
    <script src="stages/topicSelection.js"></script>
    <script src="stages/difficulty.js"></script>
    <script src="stages/ready.js"></script>
    <script src="stages/question1.js"></script>
    <script src="stages/answer1.js"></script>
    <script src="stages/question2.js"></script>
    <script src="stages/answer2.js"></script>
    <script src="stages/question3Map.js"></script>
    <script src="stages/answer3Map.js"></script>
    <script src="stages/question4Timeline.js"></script>
    <script src="stages/answer4Timeline.js"></script>
    <script src="stages/results.js"></script>
    <script src="stages/leaderboard.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
